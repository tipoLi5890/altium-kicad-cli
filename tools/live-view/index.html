<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>akcli Live Schematic</title>
<style>
  :root { --bg:#f6f7f9; --card:#fff; --ink:#1a1d21; --sub:#68707a; --line:#e3e6ea;
          --acc:#0e8a16; --err:#c93c37; --warn:#b58900; --chip:#eef1f4; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#101316; --card:#1a1f24; --ink:#e8eaed; --sub:#9aa3ad; --line:#2b3239;
            --acc:#3fb950; --err:#f2726d; --warn:#d8b62c; --chip:#242b32; }
  }
  * { box-sizing:border-box; margin:0; }
  [hidden] { display:none !important; }   /* author styles must not resurrect hidden nodes */
  body { background:var(--bg); color:var(--ink);
         font:14px/1.55 -apple-system,"Segoe UI","PingFang TC",sans-serif; padding:16px; }
  .wrap { max-width:1280px; margin:0 auto; display:grid; grid-template-columns:1fr 300px;
          gap:14px; height:calc(100vh - 32px); grid-template-rows:auto 1fr; }
  @media (max-width:920px){ .wrap{grid-template-columns:1fr; height:auto} }

  header { grid-column:1/-1; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  header h1 { font-size:18px; font-weight:650; margin-right:4px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--acc);
         animation:pulse 2s infinite; }
  .dot.stale { background:var(--sub); animation:none; }
  @keyframes pulse { 50%{opacity:.3} }
  .chip { background:var(--chip); border:1px solid var(--line); border-radius:99px;
          padding:2px 10px; font-size:12px; color:var(--sub); }
  .chip b { color:var(--ink); font-weight:600; }
  .spacer { flex:1; }
  button { background:var(--card); color:var(--ink); border:1px solid var(--line);
           border-radius:8px; padding:5px 10px; font:inherit; font-size:12.5px; cursor:pointer; }
  button:hover { border-color:var(--sub); }
  button.primary { border-color:var(--acc); color:var(--acc); font-weight:600; }
  button.on { border-color:var(--acc); color:var(--acc); }
  button:disabled { opacity:.45; cursor:default; }

  .stage { background:var(--card); border:1px solid var(--line); border-radius:12px;
           display:flex; flex-direction:column; overflow:hidden; min-height:420px; }
  .toolbar { display:flex; gap:6px; align-items:center; padding:8px 10px;
             border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .toolbar .zoomlvl { font-size:12px; color:var(--sub); min-width:44px; text-align:center; }
  .canvas { flex:1; overflow:hidden; position:relative; cursor:grab; background:
            repeating-conic-gradient(var(--chip) 0% 25%, var(--card) 0% 50%) 0 0/24px 24px; }
  .canvas.dragging { cursor:grabbing; }
  .canvas .frame { position:absolute; background:#fff; border-radius:6px; padding:10px;
                   box-shadow:0 2px 14px rgba(0,0,0,.18); transform-origin:0 0; }
  .canvas .frame svg { display:block; }
  .empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
           color:var(--sub); }

  aside { background:var(--card); border:1px solid var(--line); border-radius:12px;
          display:flex; flex-direction:column; overflow:hidden; }
  aside h2 { font-size:12px; color:var(--sub); text-transform:uppercase; letter-spacing:.07em;
             padding:12px 14px 8px; }
  .steps { overflow-y:auto; padding:0 8px 10px; flex:1; }
  .step { padding:9px 10px; border-radius:9px; cursor:pointer; border:1px solid transparent;
          margin-bottom:4px; }
  .step:hover { border-color:var(--line); }
  .step.active { border-color:var(--acc); background:color-mix(in srgb, var(--acc) 7%, transparent); }
  .step .row { display:flex; align-items:baseline; gap:8px; }
  .step .n { font-weight:650; }
  .step .t { color:var(--sub); font-size:11.5px; }
  .live { font-size:10px; font-weight:700; color:var(--acc); border:1px solid var(--acc);
          border-radius:4px; padding:0 4px; letter-spacing:.05em; }
  .badge { font-size:11px; border-radius:5px; padding:0 6px; font-weight:600; margin-left:auto; }
  .badge.ok   { color:var(--acc);  background:color-mix(in srgb, var(--acc) 12%, transparent); }
  .badge.err  { color:var(--err);  background:color-mix(in srgb, var(--err) 12%, transparent); }
  .badge.warn { color:var(--warn); background:color-mix(in srgb, var(--warn) 14%, transparent); }
  .badge.mute { color:var(--sub);  background:var(--chip); }
  .step .note { font-size:12.5px; margin-top:2px; }
  .step .meta { font-size:11px; color:var(--sub); margin-top:1px; }
  .hint { border-top:1px solid var(--line); padding:9px 14px; font-size:11.5px; color:var(--sub); }
  .hint code { background:var(--chip); padding:0 4px; border-radius:4px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="dot" id="dot"></span>
    <h1>akcli Live Schematic</h1>
    <span class="chip">watching <b id="file">…</b></span>
    <span class="chip">step <b id="stepno">–</b></span>
    <span class="chip" id="counts" hidden><b id="parts">0</b> parts · <b id="nets">0</b> nets</span>
    <span class="spacer"></span>
    <button id="follow" class="primary" hidden>▶ Back to live</button>
  </header>

  <div class="stage">
    <div class="toolbar">
      <button id="zout">−</button>
      <span class="zoomlvl" id="zlvl">fit</span>
      <button id="zin">+</button>
      <button id="zfit">Fit</button>
      <button id="crop" class="on">Crop</button>
      <span class="spacer"></span>
      <button id="prev">← Prev</button>
      <button id="next">Next →</button>
      <button id="opensvg">Open SVG</button>
    </div>
    <div class="canvas" id="canvas">
      <div class="frame" id="frame" hidden></div>
      <div class="empty" id="empty">Waiting for the first draw… (watching for akcli writes)</div>
    </div>
  </div>

  <aside>
    <h2>Timeline</h2>
    <div class="steps" id="list"></div>
    <div class="hint">
      Newest step follows automatically · <b>←/→</b> browse · <b>L</b> back to live ·
      In KiCad use <code>File → Revert</code> to reload the sheet.
    </div>
  </aside>
</div>
<script>
const $ = id => document.getElementById(id);
let steps = [], version = -1, viewing = -1, following = true, lastOk = 0;
let cropped = true, pageVB = null, cropVB = null, svgEl = null;
const BASE_W = 900;   // layout width of the sheet at scale 1

// ---- polling ----
async function tick() {
  try {
    const s = await (await fetch('state.json?ts=' + Date.now(), {cache:'no-store'})).json();
    lastOk = Date.now();
    $('file').textContent = s.file;
    if (s.version !== version) {
      version = s.version; steps = s.steps;
      renderList();
      if (following && steps.length) view(steps.length - 1);
      else highlight();
    }
  } catch (e) { /* transient */ }
  $('dot').classList.toggle('stale', Date.now() - lastOk > 6000);
}
setInterval(tick, 1500); tick();

// ---- timeline ----
function badge(st) {
  if (!st.parts) return '<span class="badge mute">empty</span>';
  if (st.erc_err == null) return '';
  if (st.erc_err === 0 && (st.erc_warn|0) === 0) return '<span class="badge ok">ERC ✓</span>';
  if (st.erc_err > 0) return `<span class="badge err">${st.erc_err}E ${st.erc_warn||0}W</span>`;
  return `<span class="badge warn">${st.erc_warn}W</span>`;
}
function renderList() {
  const list = $('list');
  list.innerHTML = steps.length ? '' : '<div class="step">No steps yet</div>';
  [...steps].reverse().forEach(st => {
    const i = st.n - 1, isLast = st.n === steps.length;
    const d = document.createElement('div');
    d.className = 'step'; d.dataset.i = i;
    d.innerHTML =
      `<div class="row"><span class="n">#${st.n}</span><span class="t">${st.time}</span>` +
      (isLast ? '<span class="live">LIVE</span>' : '') + badge(st) + `</div>` +
      (st.note ? `<div class="note">${st.note}</div>` : '') +
      (st.parts != null ? `<div class="meta">${st.parts} parts · ${st.nets} nets</div>` : '');
    d.onclick = () => { following = (i === steps.length - 1); view(i); };
    list.appendChild(d);
  });
  highlight();
}
function highlight() {
  document.querySelectorAll('.step').forEach(e =>
    e.classList.toggle('active', +e.dataset.i === viewing));
  $('follow').hidden = following;
  $('prev').disabled = viewing <= 0;
  $('next').disabled = viewing >= steps.length - 1;
}

// ---- SVG loading: inline so we can getBBox() and crop to the drawing ----
async function view(i) {
  if (i < 0 || i >= steps.length) return;
  const st = steps[i]; viewing = i;
  $('stepno').textContent = `${st.n} / ${steps.length}`;
  if (st.parts != null) { $('counts').hidden = false;
    $('parts').textContent = st.parts; $('nets').textContent = st.nets; }
  highlight();
  try {
    const text = await (await fetch(st.svg + '?v=' + st.n, {cache:'no-store'})).text();
    const frame = $('frame');
    frame.innerHTML = text.slice(Math.max(0, text.indexOf('<svg')));  // strip XML prolog
    svgEl = frame.querySelector('svg');
    if (!svgEl) return;
    frame.hidden = false; $('empty').hidden = true;
    pageVB = svgEl.getAttribute('viewBox');
    // Crop to drawn content: KiCad exports the whole page; the drawing is a
    // small region of it. getBBox() gives the exact content bounds.
    try {
      const b = svgEl.getBBox();
      if (b.width > 0 && b.height > 0) {
        const m = Math.max(b.width, b.height) * 0.04 + 1;
        cropVB = `${b.x - m} ${b.y - m} ${b.width + 2*m} ${b.height + 2*m}`;
      } else { cropVB = null; }
    } catch (e) { cropVB = null; }
    applyVB();
  } catch (e) { /* keep previous */ }
}
function vbRatio() {
  const vb = (svgEl && svgEl.getAttribute('viewBox') || '0 0 1 1').split(/\s+/).map(Number);
  return vb[3] / vb[2] || 1;
}
function applyVB() {
  if (!svgEl) return;
  const vb = (cropped && cropVB) ? cropVB : pageVB;
  if (vb) svgEl.setAttribute('viewBox', vb);
  svgEl.removeAttribute('width'); svgEl.removeAttribute('height');
  svgEl.style.width = BASE_W + 'px';
  svgEl.style.height = Math.round(BASE_W * vbRatio()) + 'px';
  $('crop').classList.toggle('on', cropped);
  applyT();
}
$('crop').onclick = () => { cropped = !cropped; scale = null; applyVB(); };
$('follow').onclick = () => { following = true; view(steps.length - 1); };
$('prev').onclick = () => { following = false; view(viewing - 1); };
$('next').onclick = () => { view(viewing + 1); following = (viewing === steps.length - 1); };
$('opensvg').onclick = () => { if (steps[viewing]) window.open(steps[viewing].svg, '_blank'); };
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') $('prev').click();
  if (e.key === 'ArrowRight') $('next').click();
  if (e.key === 'l' || e.key === 'L') $('follow').click();
});

// ---- zoom / pan ----
let scale = null, tx = 0, ty = 0;   // scale=null -> fit mode
const canvas = $('canvas'), frame = $('frame');
function contentSize() {
  const w = BASE_W + 20, h = (svgEl ? Math.round(BASE_W * vbRatio()) : BASE_W) + 20;
  return {w, h};   // + frame padding
}
function applyT() {
  const {w, h} = contentSize();
  if (scale === null) {
    const s = Math.min((canvas.clientWidth - 32) / w, (canvas.clientHeight - 32) / h, 4) || 1;
    frame.style.transform = `translate(${(canvas.clientWidth - w*s)/2}px,` +
                            `${(canvas.clientHeight - h*s)/2}px) scale(${s})`;
    $('zlvl').textContent = 'fit';
  } else {
    frame.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    $('zlvl').textContent = Math.round(scale * 100) + '%';
  }
}
new ResizeObserver(applyT).observe(canvas);
function leaveFit() {
  if (scale !== null) return;
  const m = new DOMMatrix(getComputedStyle(frame).transform);
  scale = m.a; tx = m.e; ty = m.f;
}
function setScale(s, cx, cy) {
  const r = canvas.getBoundingClientRect();
  cx = cx ?? r.width / 2; cy = cy ?? r.height / 2;
  leaveFit();
  const k = s / scale;
  tx = cx - k * (cx - tx); ty = cy - k * (cy - ty); scale = s;
  applyT();
}
$('zin').onclick = () => { leaveFit(); setScale(scale * 1.25); };
$('zout').onclick = () => { leaveFit(); setScale(scale / 1.25); };
$('zfit').onclick = () => { scale = null; applyT(); };
canvas.addEventListener('wheel', e => {
  e.preventDefault(); leaveFit();
  const r = canvas.getBoundingClientRect();
  setScale(Math.min(10, Math.max(.05, scale * (e.deltaY < 0 ? 1.12 : 1/1.12))),
           e.clientX - r.left, e.clientY - r.top);
}, {passive:false});
let drag = null;
canvas.addEventListener('pointerdown', e => {
  leaveFit(); drag = {x:e.clientX - tx, y:e.clientY - ty};
  canvas.classList.add('dragging'); canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!drag) return; tx = e.clientX - drag.x; ty = e.clientY - drag.y; applyT();
});
canvas.addEventListener('pointerup', () => { drag = null; canvas.classList.remove('dragging'); });
canvas.addEventListener('dblclick', () => { scale === null ? setScale(1.5) : (scale = null, applyT()); });
</script>
</body>
</html>
