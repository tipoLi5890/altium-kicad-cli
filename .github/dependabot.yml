version: 2
updates:
  # GitHub Actions used by .github/workflows/ci.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"

  # Python dev tooling — the [dev] extras in pyproject.toml (pytest, jsonschema, build, twine).
  # Runtime is zero-dependency; only dev/test deps are tracked here.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
      prefix-development: "build"
