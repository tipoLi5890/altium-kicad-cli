<!doctype html>
<!-- akcli README hero — source for docs/assets/hero.png (regenerate the PNG from this file).
     Render with headless Chrome at 2x (1360x400 CSS -> 2720x800 PNG):

       CHROME="/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
       "$CHROME" --headless --disable-gpu --no-sandbox --hide-scrollbars \
         --user-data-dir=/tmp/chrome-hero --force-device-scale-factor=2 \
         --window-size=1360,400 --screenshot=docs/assets/hero.png \
         "file://$PWD/docs/assets/hero.html"

     Chrome writes the PNG then does NOT exit on this platform; poll until
     docs/assets/hero.png exists, then kill the Chrome process. -->
<html><head><meta charset="utf-8"><style>
  :root{ --bg:#0a0d12; --ink:#f2f6f2; --accent:#4ee39a; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:1360px;height:400px;overflow:hidden;
    background:
      radial-gradient(58% 140% at 50% 54%, rgba(78,227,154,0.12), rgba(10,13,18,0) 62%),
      #0a0d12;
    font-family:'SF Mono','Menlo',ui-monospace,monospace;}
  .wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  .line{display:inline-flex;align-items:flex-end;}
  .prompt{color:var(--accent);font-size:118px;font-weight:500;margin-right:40px;line-height:1;
    transform:translateY(-14px);
    text-shadow:0 0 26px rgba(78,227,154,0.6);}
  .word{color:var(--ink);font-size:184px;font-weight:600;letter-spacing:4px;line-height:1;
    text-shadow:0 0 40px rgba(120,255,190,0.28),0 0 3px rgba(255,255,255,0.28);}
  .cursor{display:inline-block;width:74px;height:150px;background:var(--accent);
    margin-left:34px;opacity:.95;border-radius:3px;
    box-shadow:0 0 34px rgba(78,227,154,0.7);}
  .scan{position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.026) 0 1px,transparent 1px 5px);}
  .vig{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 82% 82% at 50% 50%,transparent 46%,rgba(0,0,0,.66) 100%);}
</style></head>
<body>
  <div class="wrap">
    <div class="line"><span class="prompt">&#10095;</span><span class="word">akcli</span><span class="cursor"></span></div>
  </div>
  <div class="scan"></div>
  <div class="vig"></div>
</body></html>
